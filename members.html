<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members - sco-music</title>
    <style>
        /* --- 共通スタイル（Aboutページと統一） --- */
        body {
            font-family: 'Times New Roman', "serif";
            line-height: 1.8;
            color: #2c3e50;
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px;
            background-color: #fdfdfd;
        }
        nav {
            margin-bottom: 40px;
        }
        nav ul {
            list-style: none;
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        nav a {
            text-decoration: none;
            color: #2c3e50;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        nav a:hover {
            color: #3498db;
            border-bottom: 1px solid #3498db;
        }
        header {
            text-align: center;
            border-bottom: 1px solid #eee;
            margin-bottom: 40px;
        }
        h1 {
            font-weight: 300;
            letter-spacing: 0.1em;
            font-size: 2.5rem;
        }

        /* --- Members専用スタイル（共通のトーンを維持） --- */
        .member-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            margin-top: 40px;
        }
        .member-card {
            text-align: center;
            padding: 20px;
        }
        .instrument-tag {
            display: inline-block;
            background: #eee;
            padding: 2px 12px;
            font-size: 0.8rem;
            color: #7f8c8d;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        h3 {
            margin: 10px 0;
            font-size: 1.4rem;
            font-weight: 400;
        }
        .profile-text {
            font-size: 0.95rem; /* 本文より少しだけ小さくして密度を調整 */
            text-align: left;
            color: #34495e;
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="members.html">Members</a></li>
            <li><a href="concerts.html">Concerts</a></li>
        </ul>
    </nav>

    <header>
        <h1>Members</h1>
    </header>

    <main>
        <div class="member-grid">
            <div class="member-card">
                <div class="instrument-tag">Violin</div>
                <h3>Name 1</h3>
                <div class="profile-text">
                    <p>ここにプロフィールを記載します。フォントやサイズが他のページと同期されていることを確認してください。</p>
                </div>
            </div>

            <div class="member-card">
                <div class="instrument-tag">Viola</div>
                <h3>Name 2</h3>
                <div class="profile-text">
                    <p>アンサンブルにおける役割や、音楽への向き合い方を記述するセクションです。</p>
                </div>
            </div>

            <div class="member-card">
                <div class="instrument-tag">Cello</div>
                <h3>Name 3</h3>
                <div class="profile-text">
                    <p>共通の余白（padding）と行間（line-height）を適用することで、サイト全体の読み心地が均一になります。</p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
