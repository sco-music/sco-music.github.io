<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members - sco-music</title>
    <style>
        /* 共通のスタイル設定（基底状態） */
        body {
            font-family: 'Times New Roman', "serif";
            line-height: 1.8;
            color: #2c3e50;
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px;
            background-color: #fdfdfd;
        }
        nav ul {
            list-style: none;
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }
        nav a { text-decoration: none; color: #2c3e50; font-weight: bold; }

        /* Members専用：グリッドレイアウト（情報の多次元配置） */
        .member-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
            margin-top: 40px;
        }
        .member-card {
            text-align: center;
        }
        .member-card img {
            width: 150px;
            height: 150px;
            border-radius: 50%; /* 円形に切り抜き */
            object-fit: cover;
            background-color: #eee;
            margin-bottom: 15px;
        }
        .instrument-tag {
            display: inline-block;
            background: #eee;
            padding: 2px 10px;
            font-size: 0.8rem;
            margin-bottom: 10px;
            border-radius: 3px;
        }
        .profile-text {
            font-size: 0.9rem;
            text-align: left;
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="members.html">Members</a></li>
            <li><a href="concerts.html">Concerts</a></li>
        </ul>
    </nav>

    <header style="text-align: center;">
        <h1>Members</h1>
    </header>

    <main>
        <div class="member-grid">
            <div class="member-card">
                <div class="instrument-tag">Violin</div>
                <h3>氏名 または ニックネーム</h3>
                <div class="profile-text">
                    <p>ここにプロフィールを記載します。出身大学や音楽歴、好きな作曲家など。テキストの密度を調整することで、全体のバランスを保ちます。</p>
                </div>
            </div>

            <div class="member-card">
                <div class="instrument-tag">Viola</div>
                <h3>氏名 または ニックネーム</h3>
                <div class="profile-text">
                    <p>プロフィール文。各メンバーがそれぞれの楽器に対する想いや、アンサンブルにおいて大切にしていることなどを記述します。</p>
                </div>
            </div>

            <div class="member-card">
                <div class="instrument-tag">Cello</div>
                <h3>氏名 または ニックネーム</h3>
                <div class="profile-text">
                    <p>プロフィール文。室内楽における低音の役割についてのこだわりなどを載せるのも興味深いかもしれません。</p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
